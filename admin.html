<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Fabio Carlesso</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/admin.css" />
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', stored || (prefersDark ? 'dark' : 'light'));
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="brand">
      <span class="brand-mark">FC</span>
      <span class="brand-name">Admin</span>
    </a>
    <nav class="nav admin-nav">
      <a href="index.html"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Site</a>
      <a href="index.html?draft=1" target="_blank" rel="noopener"><i class="fa-solid fa-eye" aria-hidden="true"></i> Preview</a>
      <button class="lang-toggle" id="resetBtn" type="button">
        <i class="fa-solid fa-rotate-left" aria-hidden="true"></i> Reset draft
      </button>
      <button class="lang-toggle primary" id="exportBtn" type="button">
        <i class="fa-solid fa-file-export" aria-hidden="true"></i> Export data.js
      </button>
    </nav>
  </header>

  <main class="admin">
    <div class="admin-banner" id="draftBanner" hidden>
      <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
      <span>Editing a local draft. Export and paste into <code>data.js</code> on GitHub to publish.</span>
    </div>
    <div id="formRoot"></div>
  </main>

  <div class="modal" id="exportModal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <h3>Export data.js</h3>
        <button type="button" class="modal-close" id="closeExport" aria-label="Close">×</button>
      </div>
      <p>Copy the content below, paste into <code>data.js</code> on GitHub and commit to <code>main</code>. The site auto-deploys.</p>
      <textarea id="exportContent" readonly></textarea>
      <div class="modal-actions">
        <button type="button" id="copyExport"><i class="fa-solid fa-copy" aria-hidden="true"></i> Copy</button>
        <button type="button" id="downloadExport"><i class="fa-solid fa-download" aria-hidden="true"></i> Download data.js</button>
        <a id="githubEditLink" class="btn-link" href="https://github.com/FabioCarlesso/fabiocarlesso.github.io/edit/main/data.js" target="_blank" rel="noopener">
          <i class="fa-brands fa-github" aria-hidden="true"></i> Open on GitHub
        </a>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
