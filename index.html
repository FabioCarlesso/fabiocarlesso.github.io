<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fabio Carlesso — Software Engineer</title>
  <meta name="description" content="Fabio Carlesso — Software Engineer focused on Java, Spring Boot, Angular and AWS." />
  <meta property="og:title" content="Fabio Carlesso — Software Engineer" />
  <meta property="og:description" content="Backend in Java/Python, frontend in Angular, cloud on AWS." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://fabiocarlesso.github.io/" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', stored || (prefersDark ? 'dark' : 'light'));
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>
<body>
  <header class="topbar">
    <a href="#" class="brand">
      <span class="brand-mark" id="brandMark">FC</span>
      <span class="brand-name" id="brandName">Fabio Carlesso</span>
    </a>
    <nav class="nav">
      <a href="#about" data-i18n="nav.about">About</a>
      <a href="#stack" data-i18n="nav.stack">Stack</a>
      <a href="#projects" data-i18n="nav.projects">Projects</a>
      <a href="#contact" data-i18n="nav.contact">Contact</a>
      <button class="icon-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">
        <i class="fa-solid fa-moon" aria-hidden="true" id="themeIcon"></i>
      </button>
      <button class="lang-toggle" id="langToggle" type="button" aria-label="Toggle language">
        <i class="fa-solid fa-globe" aria-hidden="true"></i>
        <span id="langLabel">PT</span>
      </button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="avatar" id="heroAvatar" aria-hidden="true">FC</div>
      <h1 id="heroName">Fabio Carlesso</h1>
      <p class="tagline" id="heroTagline"></p>
      <p class="hero-lead" id="heroLead"></p>
      <div class="hero-cta" id="heroLinks"></div>
    </section>

    <section id="about" class="section">
      <h2 data-i18n="about.title">About</h2>
      <div id="aboutBody"></div>
    </section>

    <section id="stack" class="section">
      <h2 data-i18n="stack.title">Stack</h2>
      <div class="stack-groups" id="stackGroups"></div>
    </section>

    <section id="projects" class="section">
      <h2 data-i18n="projects.title">Featured projects</h2>
      <div class="projects" id="projectsList"></div>
    </section>

    <section id="contact" class="section">
      <h2 data-i18n="contact.title">Contact</h2>
      <p data-i18n="contact.lead">Open to chat about backend, cloud, agile and side projects.</p>
      <ul class="contact-list" id="contactList"></ul>
    </section>
  </main>

  <footer class="site-footer">
    <p>
      © <span id="year"></span> Fabio Carlesso ·
      <a href="https://github.com/FabioCarlesso/fabiocarlesso.github.io" target="_blank" rel="noopener" data-i18n="footer.source">Source</a>
    </p>
  </footer>

  <script src="data.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
